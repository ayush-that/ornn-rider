<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Ornn Rider</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #070907;
        color: #e6ece6;
        font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      /* DOM HUD overlay. pointer-events:none so the canvas receives touches;
         hud.ts re-enables pointer-events on its interactive panels. */
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
